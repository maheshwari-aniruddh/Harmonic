<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drums - Composer Mode - AirJam</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .controls-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; }
        .page.active { padding-top: 70px; }
        .cam-area { width: 90%; max-width: 1100px; margin: 16px auto; position: relative; aspect-ratio: 4/3; border-radius: 14px; overflow: visible; background: #000; border: 2px solid rgba(255,107,107,0.3); box-shadow: 0 0 30px rgba(255,107,107,0.15); }
        .cam-area video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .cam-area canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
        .cam-area .finger-info { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); color: #fff; font-size: 0.72rem; padding: 5px 9px; border-radius: 7px; backdrop-filter: blur(8px); display: none; }
        .start-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.75); z-index: 10; }
        .start-overlay .icon { font-size: 3rem; margin-bottom: 12px; }
        .start-overlay p { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 20px; }
        .start-overlay button { padding: 14px 32px; border-radius: 14px; border: none; background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; box-shadow: 0 8px 25px rgba(255,107,107,0.4); transition: transform 0.2s; }
        .start-overlay button:hover { transform: scale(1.05); }
        .start-overlay button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .legend-bar { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 12px auto; max-width: 700px; }
        .legend-chip { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
        .legend-chip .dot { width: 12px; height: 12px; border-radius: 50%; }
        .legend-chip span { color: rgba(255,255,255,0.7); font-size: 0.8rem; font-weight: 500; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    </style>
</head>

<body>
    <div class="animated-bg"></div>

    <div id="drums-composer" class="page active">
        <div class="controls-bar">
            <div class="controls-left">
                <a href="drums.html" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>Back</span>
                </a>
                <div class="instrument-indicator">
                    <div class="indicator-animation drums-indicator"></div>
                    <span class="indicator-text">Drums - Composer Mode</span>
                </div>
            </div>
            <div class="controls-center">
                <div class="stats-display">
                    <div class="stat-item">
                        <span class="stat-label">Status</span>
                        <span class="stat-value" id="status-text" style="color:#ff6b6b;">Ready</span>
                    </div>
                </div>
            </div>
            <div class="controls-right">
                <div class="status-badge" style="display:flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);border-radius:20px;color:#ff6b6b;">
                    <div id="cam-dot" style="width:8px;height:8px;background:#666;border-radius:50%;"></div>
                    <span id="cam-label">Camera Off</span>
                </div>
            </div>
        </div>

        <div class="legend-bar" id="legend-bar"></div>

        <div class="cam-area" id="cam-area">
            <video id="cam-video" playsinline muted></video>
            <canvas id="overlay"></canvas>
            <div class="finger-info" id="finger-info"></div>
            <div class="start-overlay" id="start-overlay">
                <div class="icon">🥁</div>
                <p>Play drums with your index fingers</p>
                <button id="start-btn">Start Camera</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.min.js"></script>
    <script src="finger-drums-engine.js"></script>
    <script>
        FingerDrumsEngine.init('cam-video', 'overlay', 'start-btn', 'start-overlay', 'finger-info', 'legend-bar', 'status-text', 'cam-dot', 'cam-label');
    </script>
</body>
</html>
