<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drums - Player Mode - AirJam</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        .ar-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .ar-frame {
            width: 100%;
            height: 65vh;
            border: 2px solid rgba(255, 107, 107, 0.3);
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.5);
        }

        .mode-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .mode-title {
            color: #ff6b6b;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 20px;
            color: #ff6b6b;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .pattern-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
        }

        .pattern-select {
            padding: 10px 15px;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            min-width: 200px;
        }

        .pattern-select option {
            background: #1a1a2e;
            color: #fff;
        }

        .start-btn {
            padding: 10px 25px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="animated-bg"></div>

    <!-- Header -->
    <div class="mode-header">
        <a href="drums.html" class="back-btn">
            <span class="back-arrow">←</span>
            <span>Back</span>
        </a>
        <div class="mode-title">🥁 Drums - Player Mode</div>
        <div class="status-badge">
            <div class="status-dot"></div>
            <span>AR Active</span>
        </div>
    </div>

    <!-- Pattern Controls -->
    <div class="pattern-controls">
        <select id="patternSelect" class="pattern-select">
            <option value="drums_basic_rock">Basic Rock Beat (4/4)</option>
            <option value="drums_we_will_rock_you">We Will Rock You</option>
            <option value="drums_seven_nation">Seven Nation Army</option>
            <option value="drums_fill_roll">Drum Fill Roll</option>
        </select>
        <button id="startBtn" class="start-btn">▶ Start Pattern</button>
    </div>

    <!-- AR Camera Container -->
    <div class="ar-container">
        <iframe id="arFrame" src="http://localhost:8501/?mode=drums_player&song=drums_basic_rock&embed=true"
            class="ar-frame" frameborder="0" allow="camera; microphone"></iframe>
    </div>

    <script>
        const patternSelect = document.getElementById('patternSelect');
        const startBtn = document.getElementById('startBtn');
        const arFrame = document.getElementById('arFrame');

        function updateFrame() {
            const pattern = patternSelect.value;
            arFrame.src = `http://localhost:8501/?mode=drums_player&song=${pattern}&embed=true`;
        }

        patternSelect.addEventListener('change', updateFrame);
        startBtn.addEventListener('click', updateFrame);
    </script>

    <script src="app.js"></script>
</body>

</html>
